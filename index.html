<!DOCTYPE html>
<html lang="ur" dir="rtl" id="root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Worksheets | ورک شیٹس</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --em:#1a6b5a;--eml:#2a9478;--emp:#e8f5f1;--gd:#c9a84c;
  --cr:#fdf9f0;--ink:#1c1c1c;--mu:#6b7280;--bd:#d1e8e0;--wh:#fff;
  --sh:0 4px 24px rgba(26,107,90,.10);--rd:14px;
  --fb:'Noto Nastaliq Urdu','Noto Sans Arabic',serif;
  --fu:'Noto Sans Arabic',sans-serif;
}
html[lang="en"]{--fb:'DM Sans',sans-serif;--fu:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--cr);color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,var(--em),#0f4a3a);padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
header h1{font-size:clamp(1.4rem,4vw,2rem);color:#fff;position:relative;}
header p{color:rgba(255,255,255,.7);font-size:.9rem;margin-top:5px;font-family:var(--fu);position:relative;}
.ltog{position:absolute;top:18px;left:18px;display:flex;background:rgba(255,255,255,.15);border-radius:50px;padding:3px;gap:2px;z-index:10;}
.lbtn{padding:5px 15px;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.75);background:transparent;}
.lbtn.active{background:#fff;color:var(--em);}
/* DB status badge */
.db-badge{position:absolute;top:18px;right:18px;font-family:'DM Sans',sans-serif;font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;z-index:10;}
.db-ok{background:rgba(255,255,255,.2);color:#fff;}
.db-err{background:#c0392b;color:#fff;}

/* ── TABS ── */
.tabs{display:flex;justify-content:center;background:#fff;border-bottom:2px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.tbtn{flex:1;max-width:220px;padding:14px 12px;border:none;background:transparent;font-family:var(--fb);font-size:.88rem;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tbtn.active{color:var(--em);border-bottom-color:var(--em);font-weight:600;}
.tbtn:hover:not(.active){background:var(--emp);color:var(--em);}

/* ── PANELS ── */
.panel{display:none;padding:24px 16px 90px;max-width:920px;margin:0 auto;}
.panel.active{display:block;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── CARD ── */
.card{background:var(--wh);border-radius:var(--rd);box-shadow:var(--sh);padding:22px 20px;margin-bottom:18px;border:1px solid var(--bd);}
.ctitle{font-size:1.05rem;font-weight:700;color:var(--em);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.cicon{width:30px;height:30px;background:var(--emp);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;}

/* ── FORM ── */
.pbar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px;}
.pbar .fd{flex:1;min-width:150px;}
label{display:block;font-size:.82rem;color:var(--mu);margin-bottom:5px;font-family:var(--fu);}
input[type="text"],input[type="date"],input[type="time"],textarea,select{
  width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;
  font-family:var(--fb);font-size:.9rem;color:var(--ink);background:#fafafa;
  transition:border-color .2s,box-shadow .2s;}
html[lang="en"] input[type="text"],html[lang="en"] textarea{direction:ltr;text-align:left;}
html[lang="ur"] input[type="text"],html[lang="ur"] textarea{direction:rtl;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--eml);box-shadow:0 0 0 3px rgba(42,148,120,.12);background:#fff;}
textarea{resize:vertical;min-height:65px;}

/* ── REMARKS ── */
.remarks-row{margin-top:16px;padding-top:16px;border-top:1px dashed var(--bd);}
.remarks-row textarea{min-height:80px;background:#fffef5;border-color:#e8dfa0;}
.remarks-row textarea:focus{border-color:var(--gd);box-shadow:0 0 0 3px rgba(201,168,76,.15);}
.remarks-label-icon{color:var(--gd);}

/* ── GOAL TABLE ── */
.gt{width:100%;border-collapse:collapse;}
.gt thead th{background:var(--em);color:#fff;padding:10px 8px;font-size:.82rem;font-weight:600;text-align:center;}
html[lang="ur"] .gt thead th:first-child{border-radius:0 8px 0 0;}
html[lang="ur"] .gt thead th:last-child{border-radius:8px 0 0 0;}
html[lang="en"] .gt thead th:first-child{border-radius:8px 0 0 0;}
html[lang="en"] .gt thead th:last-child{border-radius:0 8px 0 0;}
.gt tbody tr{border-bottom:1px solid var(--bd);}
.gt tbody tr:hover{background:var(--emp);}
.gt tbody td{padding:5px 7px;vertical-align:middle;}
.gt tbody td.cl{font-weight:600;color:var(--em);white-space:nowrap;padding-inline-start:12px;min-width:110px;}
html[lang="ur"] .gt tbody td.cl{background:linear-gradient(to left,var(--emp),transparent);}
html[lang="en"] .gt tbody td.cl{background:linear-gradient(to right,var(--emp),transparent);text-align:left;}
.gt input[type="text"]{border:1px solid #dde;border-radius:6px;padding:6px 8px;font-size:.82rem;}

/* ── ANGER ENTRY ── */
.ae{background:#fff;border:1.5px solid var(--bd);border-radius:var(--rd);padding:18px;margin-bottom:18px;position:relative;}
.aenum{position:absolute;top:-11px;inset-inline-end:18px;background:var(--gd);color:#fff;font-size:.72rem;padding:2px 11px;border-radius:20px;font-family:var(--fu);font-weight:600;}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.agrid .full{grid-column:1/-1;}
.sw{display:flex;align-items:center;gap:10px;}
.sw input[type="range"]{flex:1;accent-color:var(--em);height:6px;border:none;background:transparent;padding:0;box-shadow:none;}
.sv{min-width:30px;text-align:center;font-weight:700;color:var(--em);font-family:var(--fu);}

/* ── HISTORY ── */
.hf{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;}
.hf .fd{flex:1;min-width:130px;}
.hl{display:flex;flex-direction:column;gap:10px;}
.hc{background:#fff;border:1.5px solid var(--bd);border-radius:var(--rd);overflow:hidden;transition:box-shadow .2s;}
.hc:hover{box-shadow:var(--sh);}
.hch{display:flex;align-items:center;padding:12px 16px;background:var(--emp);cursor:pointer;gap:8px;flex-wrap:wrap;}
.hcn{font-weight:700;color:var(--em);font-size:.95rem;}
.hcd{font-family:var(--fu);font-size:.8rem;color:var(--mu);}
.hch-actions{display:flex;gap:6px;align-items:center;margin-inline-start:auto;}
.hcb{padding:14px 16px;display:none;font-size:.88rem;}
.hcb.open{display:block;}
.hrow{display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.hlbl{font-weight:600;color:var(--em);min-width:110px;font-family:var(--fu);font-size:.78rem;}
.hval{color:var(--ink);flex:1;}
.hremarks{background:#fffef5;border:1px solid #e8dfa0;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:.85rem;}
.hremarks-lbl{font-weight:700;color:var(--gd);font-size:.78rem;font-family:var(--fu);margin-bottom:4px;}
.est{text-align:center;padding:40px 20px;color:var(--mu);font-family:var(--fu);}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-family:var(--fu);font-weight:600;}
.bg{background:var(--emp);color:var(--em);}
.ba{background:#fef3c7;color:#92400e;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-family:var(--fb);font-size:.88rem;cursor:pointer;transition:all .2s;}
.bpr{background:var(--em);color:#fff;}
.bpr:hover{background:var(--eml);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,107,90,.3);}
.bol{background:transparent;border:1.5px solid var(--em);color:var(--em);}
.bol:hover{background:var(--emp);}
.bda{background:#fff;border:1.5px solid #f3a0a0;color:#c0392b;font-size:.76rem;padding:5px 11px;}
.bda:hover{background:#fff0f0;}
.bedit{background:#fff;border:1.5px solid var(--eml);color:var(--eml);font-size:.76rem;padding:5px 11px;}
.bedit:hover{background:var(--emp);}
.bsm{padding:6px 14px;font-size:.82rem;}
.acts{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:18px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--rd);width:100%;max-width:800px;box-shadow:0 20px 60px rgba(0,0,0,.2);margin:auto;animation:mfi .25s ease;}
@keyframes mfi{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--bd);background:var(--emp);border-radius:var(--rd) var(--rd) 0 0;}
.modal-title{font-size:1rem;font-weight:700;color:var(--em);}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--mu);line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--em);}
.modal-body{padding:20px;max-height:75vh;overflow-y:auto;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end;}
.edit-notice{background:#fff8e1;border:1px solid var(--gd);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.82rem;font-family:var(--fu);color:#7a5c00;}

/* ── LOADING OVERLAY ── */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-spinner{width:44px;height:44px;border:4px solid var(--bd);border-top-color:var(--em);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--fu);font-size:.9rem;color:var(--mu);}

/* ── PRINT / TOAST ── */
.pbtn{position:fixed;bottom:22px;left:22px;background:var(--gd);color:#fff;border:none;border-radius:50px;padding:10px 18px;font-family:var(--fu);font-size:.82rem;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,.4);display:flex;align-items:center;gap:7px;z-index:400;transition:all .2s;}
.pbtn:hover{transform:translateY(-2px);}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--em);color:#fff;padding:10px 24px;border-radius:50px;font-family:var(--fu);font-size:.82rem;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:580px){
  .agrid{grid-template-columns:1fr;}
  .gt,.gt thead,.gt tbody,.gt th,.gt td,.gt tr{display:block;}
  .gt thead tr{display:none;}
  .gt tbody tr{margin-bottom:12px;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
  .gt tbody td{padding:5px 10px;}
  .hch{gap:6px;}
}
@media print{
  .tabs,.pbtn,.acts,.btn,.toast,.ltog,.hf,.modal-overlay,.loading,.db-badge{display:none!important;}
  .panel{display:block!important;padding:0;}body{background:#fff;}
  .card{box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">ڈیٹا بیس لوڈ ہو رہا ہے…</div>
</div>

<!-- HEADER -->
<header>
  <div class="ltog">
    <button class="lbtn active" id="btn-ur" onclick="setLang('ur')">اردو</button>
    <button class="lbtn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <h1 id="hdr-title">📋 ورک شیٹس</h1>
  <p id="hdr-sub">اہداف طے کرنے کا فارم اور غصے کا لاگ</p>
  <div class="db-badge db-ok" id="db-badge">⏳ DB…</div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tbtn active" id="tab-goals"   onclick="switchTab('goals',event)">🎯 <span id="tgl">اہداف</span></button>
  <button class="tbtn"        id="tab-anger"   onclick="switchTab('anger',event)">😤 <span id="tal">غصے کا لاگ</span></button>
  <button class="tbtn"        id="tab-history" onclick="switchTab('history',event)">📂 <span id="thl">پچھلے اندراجات</span></button>
</nav>

<!-- GOALS PANEL -->
<div class="panel active" id="panel-goals">
  <div class="card">
    <div class="ctitle"><span class="cicon">📝</span><span id="gct">اہداف طے کرنے کا ورک شیٹ</span></div>
    <div class="pbar">
      <div class="fd"><label id="gln">نام</label><input type="text" id="g-name" placeholder="اپنا نام لکھیں"/></div>
      <div class="fd"><label id="gld">تاریخ</label><input type="date" id="g-date"/></div>
    </div>
  </div>
  <div class="card">
    <div class="ctitle"><span class="cicon">🏹</span><span id="gtt">اہداف کا جدول</span></div>
    <p id="gth" style="font-size:.82rem;color:var(--mu);margin-bottom:14px;font-family:var(--fu);"></p>
    <div style="overflow-x:auto;">
      <table class="gt">
        <thead><tr><th id="gthc">زمرہ</th><th id="gths"></th><th id="gthm"></th><th id="gthl"></th></tr></thead>
        <tbody id="gtb"></tbody>
      </table>
    </div>
    <div class="remarks-row">
      <label><span class="remarks-label-icon">💬</span> <span id="g-remarks-lbl">ریمارکس / نوٹس</span></label>
      <textarea id="g-remarks" rows="3" placeholder="کوئی اضافی نوٹ یا تبصرہ…"></textarea>
    </div>
    <div class="acts">
      <button class="btn bpr" onclick="saveGoals()">💾 <span id="gbs">محفوظ کریں</span></button>
      <button class="btn bol" onclick="resetGoalForm()">🔄 <span id="gbn">نئی اندراج</span></button>
    </div>
  </div>
</div>

<!-- ANGER PANEL -->
<div class="panel" id="panel-anger">
  <div class="card">
    <div class="ctitle"><span class="cicon">📔</span><span id="act">غصے کا لاگ</span></div>
    <div class="pbar">
      <div class="fd"><label id="aln">نام</label><input type="text" id="a-name" placeholder="اپنا نام لکھیں"/></div>
      <div class="fd"><label id="ald">تاریخ</label><input type="date" id="a-date"/></div>
    </div>
  </div>
  <div id="anger-entries"></div>
  <button class="btn bol" onclick="addAngerEntry()" style="width:100%;justify-content:center;margin-bottom:14px;">
    ➕ <span id="aal">نئی اندراج شامل کریں</span>
  </button>
  <div class="card">
    <div class="remarks-row" style="margin-top:0;padding-top:0;border-top:none;">
      <label><span class="remarks-label-icon">💬</span> <span id="a-remarks-lbl">ریمارکس / نوٹس</span></label>
      <textarea id="a-remarks" rows="3" placeholder="کوئی اضافی نوٹ یا تبصرہ…"></textarea>
    </div>
  </div>
  <div class="acts">
    <button class="btn bpr" onclick="saveAnger()">💾 <span id="abs">محفوظ کریں</span></button>
    <button class="btn bol" onclick="resetAngerForm()">🔄 <span id="abn">نئی اندراج</span></button>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="panel-history">
  <div class="card">
    <div class="ctitle"><span class="cicon">📂</span><span id="hct">پچھلے اندراجات</span></div>
    <div class="hf">
      <div class="fd"><label id="hln">نام سے تلاش</label><input type="text" id="hfn" oninput="renderHistory()" placeholder="نام…"/></div>
      <div class="fd"><label id="hlt">قسم</label>
        <select id="hft" onchange="renderHistory()">
          <option value="" id="hoa">سب</option>
          <option value="goals" id="hog">اہداف</option>
          <option value="anger" id="hoa2">غصے کا لاگ</option>
        </select>
      </div>
      <div class="fd"><label id="hld">تاریخ</label><input type="date" id="hfd" oninput="renderHistory()"/></div>
      <div style="display:flex;align-items:flex-end;">
        <button class="btn bol bsm" onclick="clearFilters()" id="hcf">فلٹر صاف کریں</button>
      </div>
    </div>
  </div>
  <div id="history-list" class="hl"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="modalOverlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">✏️ ترمیم کریں</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn bpr" onclick="saveEdit()">💾 <span id="modal-save-lbl">تبدیلیاں محفوظ کریں</span></button>
      <button class="btn bol" onclick="closeModal()"><span id="modal-cancel-lbl">منسوخ کریں</span></button>
    </div>
  </div>
</div>

<button class="pbtn" onclick="window.print()">🖨 <span id="prl">پرنٹ / PDF</span></button>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
const T = {

    hT:'📋 ورک شیٹس', hS:'اہداف طے کرنے کا فارم اور غصے کا لاگ',

    aAL:'نئی اندراج شامل کریں', aBS:'محفوظ کریں', aBN:'نئی اندراج',

    aIN:'غصے کی شدت (1–10)', aBT:'کیا بہتر کر سکتے تھے؟', aBP:'اگلی بار کیا مختلف کریں گے…',
    aRL:'ریمارکس / نوٹس', aRP:'کوئی اضافی نوٹ یا تبصرہ…',
    hCT:'پچھلے اندراجات', hLN:'نام سے تلاش', hLT:'قسم', hLD:'تاریخ',

// ═══════════════════════════════════════════════════
//  INDEXEDDB  — persistent local database
//  DB name : WorksheetsDB  |  version : 1
//  Object store : entries  |  keyPath : id (number timestamp)
//  Index on "savedAt" for chronological retrieval
// ═══════════════════════════════════════════════════
const DB_NAME    = 'WorksheetsDB';
const DB_VERSION = 1;
const STORE      = 'entries';
let   db         = null;   // will hold the open IDBDatabase

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = e => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains(STORE)) {
        const store = idb.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('savedAt', 'savedAt', { unique: false });
        store.createIndex('type',    'type',    { unique: false });
        store.createIndex('name',    'name',    { unique: false });
        store.createIndex('date',    'date',    { unique: false });
      }
    };

    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

/* Add a new record */
function dbAdd(record) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = e  => reject(e.target.error);
  });
}

/* Update an existing record by id */
function dbPut(record) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = e  => reject(e.target.error);
  });
}

/* Delete a record by id */
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = e  => reject(e.target.error);
  });
}

/* Get all records, sorted newest-first */
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx    = db.transaction(STORE, 'readonly');
    const req   = tx.objectStore(STORE).getAll();
    req.onsuccess = () => {
      const all = req.result || [];
      all.sort((a,b) => b.id - a.id);   // newest first
      resolve(all);
    };
    req.onerror = e => reject(e.target.error);
  });
}

/* Get a single record by id */
function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror   = e  => reject(e.target.error);
  });
}

/* Migrate old localStorage data into IndexedDB on first run */
async function migrateFromLocalStorage() {
  const OLD_KEY = 'ws_v4';
  const raw = localStorage.getItem(OLD_KEY);
  if (!raw) return;
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || arr.length === 0) return;
    const existing = await dbGetAll();
    if (existing.length > 0) return;   // already migrated
    for (const rec of arr) {
      await dbAdd(rec).catch(()=>{});
    }
    localStorage.removeItem(OLD_KEY);
    console.log(`Migrated ${arr.length} records from localStorage → IndexedDB`);
  } catch(e) { console.warn('Migration failed', e); }
}

function buildGoalTable() {
  const t = T[CL];
  document.getElementById('gtb').innerHTML = t.cats.map(c=>`
    <tr>
      <td class="cl">${c.emoji} ${c.label}</td>
      <td><input type="text" data-cat="${c.key}" data-term="short"  placeholder="${t.pS}"/></td>
      <td><input type="text" data-cat="${c.key}" data-term="medium" placeholder="${t.pM}"/></td>
      <td><input type="text" data-cat="${c.key}" data-term="long"   placeholder="${t.pL}"/></td>
    </tr>`).join('');
}

function getGoalData() {
  const goals = {};
  document.querySelectorAll('#gtb input').forEach(i => {
    const c=i.dataset.cat, tm=i.dataset.term;
    if(!goals[c]) goals[c]={};
    goals[c][tm] = i.value;
  });
  return goals;
}

async function saveGoals() {
  const t    = T[CL];
  const name = document.getElementById('g-name').value.trim();
  const date = document.getElementById('g-date').value;
  if (!name) { showToast(t.nM); return; }
  const record = {
    id: Date.now(), type: 'goals', name, date, lang: CL,
    goals: getGoalData(),
    remarks: document.getElementById('g-remarks').value,
    savedAt: new Date().toISOString()
  };
  await dbAdd(record);
  historyCache.unshift(record);
  showToast(t.tG2);
  resetGoalForm();
  renderHistoryFromCache();
}

function resetGoalForm() {
  buildGoalTable();
  document.getElementById('g-date').value = today();
  document.getElementById('g-remarks').value = '';
}

async function loadAndRenderHistory() {
  historyCache = await dbGetAll();
  renderHistoryFromCache();
}

function renderHistoryFromCache() {
  const t    = T[CL];
  const list = document.getElementById('history-list');
  let data   = [...historyCache];

  const fn = (document.getElementById('hfn')||{}).value?.trim().toLowerCase()||'';
  const ft = (document.getElementById('hft')||{}).value||'';
  const fd = (document.getElementById('hfd')||{}).value||'';
  if (fn) data = data.filter(e=>e.name.toLowerCase().includes(fn));
  if (ft) data = data.filter(e=>e.type===ft);
  if (fd) data = data.filter(e=>e.date===fd);

  if (!data.length) {
    list.innerHTML=`<div class="est"><div style="font-size:2.5rem;margin-bottom:10px">📭</div>
      <div style="font-weight:600">${t.hET}</div>
      <div style="font-size:.85rem;margin-top:5px">${t.hED}</div></div>`;
    return;
  }

  list.innerHTML = data.map(e => {
    const bl   = e.type==='goals'?t.bG:t.bA;
    const bc   = e.type==='goals'?'bg':'ba';
    const body = e.type==='goals' ? gBody(e,t) : aBody(e,t);
    const remarksHtml = e.remarks ? `
      <div class="hremarks">
        <div class="hremarks-lbl">💬 ${t.rmkLbl}</div>
        <div>${x2(e.remarks)}</div>
      </div>` : '';
    const editedTag = e.editedAt
      ? `<small style="font-family:var(--fu);font-size:.7rem;color:var(--mu);margin-inline-start:6px">✏️ ${e.editedAt.slice(0,10)}</small>` : '';
    return `
      <div class="hc">
        <div class="hch" onclick="togCard('hcb-${e.id}')">
          <span class="hcn">👤 ${x2(e.name)}</span>
          <span class="hcd">📅 ${e.date||'—'}${editedTag}</span>
          <span class="badge ${bc}">${bl}</span>
          <div class="hch-actions" onclick="event.stopPropagation()">
            <button class="btn bedit bsm" onclick="openEdit(${e.id})">✏️ ${t.editLbl}</button>
            <button class="btn bda   bsm" onclick="delEntry(event,${e.id})">🗑 ${t.delLbl}</button>
          </div>
        </div>
        <div class="hcb" id="hcb-${e.id}">
          ${body}
          ${remarksHtml}
        </div>
      </div>`;
  }).join('');
}

/* alias so filter inputs call renderHistory() */
function renderHistory() { renderHistoryFromCache(); }

function gBody(e, t) {
  const cats = T[e.lang||'ur'].cats;
  return cats.map(c => {
    const g=e.goals?.[c.key]||{}, s=g.short||'', m=g.medium||'', l=g.long||'';
    if (!s&&!m&&!l) return '';
    return `<div style="margin-bottom:10px">
      <div style="font-weight:700;color:var(--em);margin-bottom:4px;font-size:.85rem">${c.emoji} ${c.label}</div>
      <div class="hrow"><span class="hlbl">${t.gTS.replace(/<[^>]+>/g,'').trim()}</span><span class="hval">${x2(s||'—')}</span></div>
      <div class="hrow"><span class="hlbl">${t.gTM.replace(/<[^>]+>/g,'').trim()}</span><span class="hval">${x2(m||'—')}</span></div>
      <div class="hrow"><span class="hlbl">${t.gTL.replace(/<[^>]+>/g,'').trim()}</span><span class="hval">${x2(l||'—')}</span></div>
    </div>`;

              <td><input type="text" data-cat="${c.key}" data-term="medium" value="${x1(g.medium||'')}" placeholder="${t.pM}"/></td>
              <td><input type="text" data-cat="${c.key}" data-term="long"   value="${x1(g.long  ||'')}" placeholder="${t.pL}"/></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="remarks-row">
      <label><span class="remarks-label-icon">💬</span> ${t.rmkLbl}</label>
      <textarea id="em-remarks" placeholder="${t.gRP}" style="direction:${dir}">${x2(rec.remarks||'')}</textarea>
    </div>`;
}

function buildAngerEditForm(rec, t) {
  const lang=rec.lang||'ur', dir=T[lang].dir, fields=T[lang].aF;
  let html = `
    <div class="edit-notice">${t.editNotice}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
      <div style="flex:1;min-width:140px"><label>${t.aLN}</label>
        <input type="text" id="em-name" value="${x1(rec.name)}" style="direction:${dir}"/></div>
      <div style="flex:1;min-width:140px"><label>${t.aLD}</label>
        <input type="date" id="em-date" value="${rec.date||''}"/></div>
    </div>`;
  (rec.entries||[]).forEach((en,i)=>{
    html += `
      <div style="border:1.5px solid var(--bd);border-radius:var(--rd);padding:16px;margin-bottom:14px;">
        <div style="font-weight:700;color:var(--gd);margin-bottom:10px;font-size:.82rem">${t.aEL} ${i+1}</div>
        <div class="agrid">
          ${fields.map(f=>`
            <div class="${f.full?'full':''}">
              <label>${f.label}</label>
              ${f.type==='textarea'
                ? `<textarea id="em-ae-${i}-${f.key}" style="direction:${dir}" placeholder="${f.label}…">${x2(en[f.key]||'')}</textarea>`
                : `<input type="${f.type}" id="em-ae-${i}-${f.key}" value="${x1(en[f.key]||'')}"/>`}
            </div>`).join('')}
          <div>
            <label>${t.aIN}</label>
            <div class="sw">
              <input type="range" min="1" max="10" value="${en.intensity||5}" id="em-ae-${i}-intensity"
                oninput="document.getElementById('em-av-${i}').textContent=this.value"/>
              <span class="sv" id="em-av-${i}">${en.intensity||5}</span>
            </div>
          </div>
          <div>
            <label>${t.aBT}</label>
            <textarea id="em-ae-${i}-better" style="direction:${dir}" placeholder="${t.aBP}">${x2(en.better||'')}</textarea>
          </div>
        </div>
      </div>`;
  });
  html += `
    <div class="remarks-row">
      <label><span class="remarks-label-icon">💬</span> ${t.rmkLbl}</label>
      <textarea id="em-remarks" placeholder="${t.aRP}" style="direction:${dir}">${x2(rec.remarks||'')}</textarea>
    </div>`;
  return html;
}

async function saveEdit() {
  const t   = T[CL];
  const rec = await dbGet(editingId);
  if (!rec) { closeModal(); return; }

  const name    = (document.getElementById('em-name')||{}).value?.trim() || rec.name;
  const date    = (document.getElementById('em-date')||{}).value || rec.date;
  const remarks = (document.getElementById('em-remarks')||{}).value ?? rec.remarks ?? '';

  let updated;
  if (rec.type === 'goals') {
    const goals = {};
    document.querySelectorAll('.modal-body input[data-cat]').forEach(i=>{
      const c=i.dataset.cat, tm=i.dataset.term;
      if(!goals[c]) goals[c]={};
      goals[c][tm]=i.value;
    });
    updated = {...rec, name, date, goals, remarks, editedAt:new Date().toISOString()};
  } else {
    const lang=rec.lang||'ur', fields=T[lang].aF;
    const allKeys=[...fields.map(f=>f.key),'intensity','better'];
    const entries=(rec.entries||[]).map((en,i)=>{
      const o={};
      allKeys.forEach(k=>{
        const el=document.getElementById(`em-ae-${i}-${k}`);
        o[k]=el?el.value:(en[k]||'');
      });
      return o;
    });
    updated = {...rec, name, date, entries, remarks, editedAt:new Date().toISOString()};
  }

  await dbPut(updated);
  // update in-memory cache
  const idx = historyCache.findIndex(e=>e.id===editingId);
  if (idx!==-1) historyCache[idx] = updated;
  showToast(t.tU);
  closeModal();
  renderHistoryFromCache();
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
  editingId = null;
}
function modalOverlayClick(e) { if(e.target===document.getElementById('edit-modal')) closeModal(); }

// ═══════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════
function switchTab(tab, e) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(e) e.currentTarget.classList.add('active');
  if(tab==='history') loadAndRenderHistory();
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent='✅ '+msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function today() { return new Date().toISOString().split('T')[0]; }
function x1(s)   { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function x2(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════
//  INIT  — open DB then boot the UI
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  const badge      = document.getElementById('db-badge');
  const loadingDiv = document.getElementById('loading');

  document.getElementById('loading-text').textContent = T[CL].loading;

  try {
    await openDB();
    await migrateFromLocalStorage();

    // pre-load history into cache
    historyCache = await dbGetAll();

    badge.textContent = T[CL].dbOk;
    badge.className   = 'db-badge db-ok';
  } catch(err) {
    console.error('IndexedDB failed:', err);
    badge.textContent = T[CL].dbErr;
    badge.className   = 'db-badge db-err';
    // graceful fallback — app still works with empty cache
  }

  // hide loading screen
  loadingDiv.style.display = 'none';

  setLang(CL);
  document.getElementById('g-date').value = today();
  document.getElementById('a-date').value = today();
});

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
